<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Heat Island Simulator</title>
    <link rel="icon" type="image/x-icon" href="tree.png">
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 98%;
        width: 100%;
        bottom: 0;
        position: absolute;
      }
      #infoDiv {
        position: absolute;
        top: 30px;
        left: 60px;
      }
      #paneDiv {
        padding: 10px;
        width: 270px;
        background-color: rgba(255, 255, 255, 0.8);
        position: absolute;
        bottom: 140;
        right: 0;
      }
      #loadingOverlay {
        display: none; /* Hidden by default */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.0); /* Semi-transparent overlay */
        z-index: 1000; /* Ensure it's above all other content */
      }
      #loadingIndicator {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 20px;
        border-radius: 5px;
        font-size: 16px;
      }
    </style>
    <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.31/"></script>
    <script src="index.js"></script>
  </head>
  <body>
    <div id="header" style="vertical-align: middle; margin-top: -20; padding-left: 15; font-size: 1.1em;">
      SATX 2024 - Heat Island Simulator
    </div>
    <div id="viewDiv"></div>
    <div id="infoDiv">
      <input
              class="esri-component esri-widget esri-interactive"
              type="button"
              id="cursor"
              value="Cursor"
      />
      <input
        class="esri-component esri-widget esri-interactive"
        type="button"
        id="addTrees"
        value="Add Tree"
      />
      <input
              class="esri-component esri-widget esri-interactive"
              type="button"
              id="reset"
              value="Reset"
      />
      <br>
    </div>
    <div id="paneDiv" class="esri-widget">
      <b>View Statistics:</b><br>
      Building Count: <b><span id="buildingCount">0</span></b><br>
      Tree Count: <b><span id="treeCount">0</span></b><br>
      Average temperature: <b><span id="avgTemperature">0°F</span></b><br>
      <br>
      <b>LST Date</b>
      <br>
      <select id="selectLST" class="esri-widget" style="width: 230px; padding: 10px; margin: 10px">
        <option value=1>Sep 2024</option>
        <option value=2>Feb 2024</option>
        <option value=3>LCZ Test</option>
        <!--        <option value=3>March 2024</option>-->
      </select>
      <!--      <b>Tree Year</b>-->
      <!--      <br>-->
      <!--      <select id="selectTreePopulus" class="esri-widget" style="width: 230px; padding: 10px; margin: 10px">-->
      <!--        <option value=1>2021</option>-->
      <!--        <option value=2>2019</option>-->
      <!--        <option value=3>2017</option>-->
      <!--      </select>-->
      <!--      <b>Building Year</b>-->
      <!--      <br>-->
      <!--      <select id="selectBuildingPopulos" class="esri-widget" style="width: 230px; padding: 10px; margin: 10px">-->
      <!--        <option value=1>2021</option>-->
      <!--        <option value=2>2019</option>-->
      <!--        <option value=3>2017</option>-->
      <!--      </select>-->
    </div>
    <div id="loadingOverlay">
      <div id="loadingIndicator">
        Loading, please wait...
      </div>
    </div>
  </body>
</html>
