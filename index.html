    <title>Heat Island Simulator</title>
    <link rel="icon" type="image/x-icon" href="tree.png">
    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 98%;
        width: 100%;
        bottom: 0;
        position: absolute;
      }
      #infoDiv {
        position: absolute;
        top: 30px;
        left: 60px;
      }
      #paneDiv {
        padding: 10px;
        width: 270px;
        background-color: rgba(255, 255, 255, 0.8);
        position: absolute;
        bottom: 140;
        right: 0;
      }

    <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />

  </head>

  <body>
    <div id="header" style="vertical-align: middle; margin-top: -20; padding-left: 15; font-size: 1.1em;">
      SATX 2024 - Heat Island Simulator
    </div>
    <div id="viewDiv"></div>
    <div id="infoDiv"> 
      <input
        class="esri-component esri-widget esri-interactive"
        type="button"
        id="addTrees"
        value="Add Trees"
      />
    </div>
    <div id="paneDiv" class="esri-widget">
      <b>View Statistics:</b><br>
      Building Count: <b><span id="buildingCount">0</span></b><br>
      Tree Count: <b><span id="treeCount">0</span></b><br>
      Average temperature: <b><span id="avgTemperature">0°F</span></b><br>
      <br>
      <b>LST Date</b>
      <br>
      <select onchange="handleLSTChange()" id="selectLST" class="esri-widget" style="width: 230px; padding: 10px; margin: 10px">
        <option value=1>Oct 2024</option>
        <option value=2>Feb 2024</option>
